interface:
  display_name: "Oracle"
  short_description: "Ask GPT-5.5 Pro through Chrome using the Chrome plugin"
  icon_small: "./assets/gpt-5.5-pro.png"
  icon_large: "./assets/gpt-5.5-pro.png"
  brand_color: "#FF7A6C"
  default_prompt: "When asked to use Oracle, gather the relevant verified local context, then use the Chrome plugin / Codex Chrome Extension against the user's logged-in Chrome ChatGPT session. Select Pro (GPT-5.5 Pro / Extended Pro), verify the visible model control says Extended Pro or an equivalent Pro label before sending, wait for the answer to complete even if it takes many minutes, and summarize the useful guidance back in Codex. Do not use the in-app Browser. Do not use Computer Use by default. Never cancel a Pro run for duration alone; recover/reclaim the tab if the Chrome plugin socket stalls. If the live ChatGPT tab is claimable but body, DOM, or screenshot reads keep timing out, recover the saved chatgpt.com/c conversation URL from open tabs or Chrome history, reopen it in a fresh tab, and extract the completed answer there before starting a duplicate run."
